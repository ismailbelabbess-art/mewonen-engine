name: The Mirror
on:
  workflow_dispatch:
jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install moviepy requests pillow numpy
      - run: sudo apt-get update -qq && sudo apt-get install -y -qq ffmpeg
      - env:
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          MEWONEN_VOICE_ID: ${{ secrets.MEWONEN_VOICE_ID }}
          MEWONEN_TELEGRAM_BOT_TOKEN: ${{ secrets.MEWONEN_TELEGRAM_BOT_TOKEN }}
          MEWONEN_TELEGRAM_CHAT_ID: ${{ secrets.MEWONEN_TELEGRAM_CHAT_ID }}
        run: python mirror_machine.py

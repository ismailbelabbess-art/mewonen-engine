name: Loneliness Epidemic

on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          pip install moviepy requests pillow numpy
          sudo apt-get update -qq && sudo apt-get install -y -qq ffmpeg libjpeg-dev zlib1g-dev
      - name: Generate Loneliness video
        env:
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          MEWONEN_VOICE_ID: ${{ secrets.MEWONEN_VOICE_ID }}
          MEWONEN_TELEGRAM_BOT_TOKEN: ${{ secrets.MEWONEN_TELEGRAM_BOT_TOKEN }}
          MEWONEN_TELEGRAM_CHAT_ID: ${{ secrets.MEWONEN_TELEGRAM_CHAT_ID }}
          CALM_TELEGRAM_BOT_TOKEN: ${{ secrets.CALM_TELEGRAM_BOT_TOKEN }}
          CALM_TELEGRAM_CHAT_ID: ${{ secrets.CALM_TELEGRAM_CHAT_ID }}
          SAMURAI_TELEGRAM_BOT_TOKEN: ${{ secrets.SAMURAI_TELEGRAM_BOT_TOKEN }}
          SAMURAI_TELEGRAM_CHAT_ID: ${{ secrets.SAMURAI_TELEGRAM_CHAT_ID }}
        run: python loneliness_machine.py

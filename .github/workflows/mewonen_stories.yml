name: Mewonen Stories

on:
  schedule:
    - cron: '0 16 * * *'
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq ffmpeg libjpeg-dev zlib1g-dev
          pip install moviepy requests pillow numpy
      - name: Generate story
        env:
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          MEWONEN_VOICE_ID: ${{ secrets.MEWONEN_VOICE_ID }}
          PEXELS_KEY: ${{ secrets.PEXELS_KEY }}
          MEWONEN_TELEGRAM_BOT_TOKEN: ${{ secrets.MEWONEN_TELEGRAM_BOT_TOKEN }}
          MEWONEN_TELEGRAM_CHAT_ID: ${{ secrets.MEWONEN_TELEGRAM_CHAT_ID }}
        run: python mewonen_stories.py
